name: Bug report
description: Hub API, portal, or documentation defect
title: "[bug] "
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Hub release (from GET /api/health hub_release.version)
      placeholder: "1.1.0"
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
