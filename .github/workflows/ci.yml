name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: |
            package-lock.json
            mcp/package-lock.json

      - name: Install deps
        run: |
          npm ci
          (cd mcp && npm ci)

      - name: Security audit (high+)
        run: npm run ci:audit

      - name: Smoke tests (hermetic)
        run: npm run ci:smoke

