name: Nightly

on:
  schedule:
    # 03:15 UTC daily
    - cron: "15 3 * * *"
  workflow_dispatch:

jobs:
  nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Security audit (high+)
        run: npm run ci:audit

      - name: Smoke tests (hermetic)
        run: npm run ci:smoke

