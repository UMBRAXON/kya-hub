name: Publish @umbraxon_kya/kya-verify to npm
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type "publish" to upload
        required: true

jobs:
  publish:
    if: github.event.inputs.confirm == 'publish'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Require NPM_TOKEN secret
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "::error::Missing repository secret NPM_TOKEN."
            echo "Add: github.com/UMBRAXON/kya-hub/settings/secrets/actions → New repository secret → Name NPM_TOKEN"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          always-auth: true

      - name: npm whoami (verify token)
        run: |
          npm whoami
          npm config get registry

      - name: Dry-run pack contents
        working-directory: packages/kya-verify
        run: npm publish --dry-run --access public

      - name: Publish @umbraxon_kya/kya-verify
        working-directory: packages/kya-verify
        run: npm publish --access public
