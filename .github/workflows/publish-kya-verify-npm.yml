name: Publish @umbraxon/kya-verify to npm
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type "publish" to upload
        required: true

jobs:
  publish:
    if: github.event.inputs.confirm == 'publish'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Publish
        working-directory: packages/kya-verify
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
