name: Publish @umbraxon_kya/kya-verify to npm
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: Type "publish" to upload
        required: true

jobs:
  publish:
    if: github.event.inputs.confirm == 'publish'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Require NPM_TOKEN
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error::Add repository secret NPM_TOKEN (granular token, org umbraxon_kya)."
            exit 1
          fi
          LEN="$(printf '%s' "$NODE_AUTH_TOKEN" | tr -d '\n\r' | wc -c)"
          echo "NPM_TOKEN length: ${LEN} (granular tokens are often ~40 chars — OK)"

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Verify token + publish
        id: publish
        working-directory: packages/kya-verify
        run: |
          set -euo pipefail
          TOKEN="$(printf '%s' "$NODE_AUTH_TOKEN" | tr -d '\n\r' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')"
          export NODE_AUTH_TOKEN="$TOKEN"
          npm config set //registry.npmjs.org/:_authToken "$TOKEN"
          CODE="$(curl -fsS -o /tmp/whoami.json -w '%{http_code}' \
            -H "Authorization: Bearer ${TOKEN}" \
            https://registry.npmjs.org/-/whoami || true)"
          if [ "$CODE" != "200" ]; then
            echo "::error::NPM_TOKEN rejected (HTTP ${CODE})"
            cat /tmp/whoami.json 2>/dev/null || true
            exit 1
          fi
          echo "Registry OK: $(cat /tmp/whoami.json)"
          npm whoami
          VERSION="$(node -p "require('./package.json').version")"
          if npm view "@umbraxon_kya/kya-verify@${VERSION}" version 2>/dev/null; then
            echo "::notice::@umbraxon_kya/kya-verify@${VERSION} already on npm — nothing to do."
            exit 0
          fi
          set +e
          OUT="$(npm publish --access public 2>&1)"
          EC=$?
          echo "$OUT"
          if [ "$EC" -eq 0 ]; then
            echo "::notice::Published @umbraxon_kya/kya-verify@${VERSION}"
            exit 0
          fi
          if echo "$OUT" | grep -qiE 'cannot publish over|already exists|E409|403.*version'; then
            if npm view "@umbraxon_kya/kya-verify@${VERSION}" version 2>/dev/null; then
              echo "::notice::Version ${VERSION} is on npm (publish race) — OK"
              exit 0
            fi
          fi
          exit "$EC"
