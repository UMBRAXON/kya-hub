# =====================================================================
#  kya-hub-proxy (ambassador) — default vhost
#  Container: kya-hub-proxy
#  Network:   generated_default (BTCPay's network)
#  Purpose:   Receive Host=umbraxon.xyz from BTCPay's outer nginx,
#             forward API/docs to host:3000 (kya-hub) and the public
#             portal to host:3001 (Next.js, pm2 kya-portal).
# =====================================================================

# Upstream pointing to the host-side kya-hub (pm2-managed Node.js)
upstream kya_hub_backend {
    server host.docker.internal:3000 max_fails=3 fail_timeout=10s;
    keepalive 32;
    keepalive_timeout 60s;
    keepalive_requests 1000;
}

# Next.js portal (pm2 kya-portal)
upstream kya_portal_backend {
    server host.docker.internal:3001 max_fails=3 fail_timeout=10s;
    keepalive 16;
    keepalive_timeout 60s;
    keepalive_requests 500;
}

# Rate-limit zones (per binary remote IP) — outer nginx forwards real IP via X-Forwarded-For
# We use $http_x_forwarded_for primary, fallback to $remote_addr.
map $http_x_forwarded_for $real_client_ip {
    default $remote_addr;
    "~*^(?<first>[^,]+)"  $first;
}

# Zones consume ~16 KB per IP entry; 10m = ~640k tracked IPs. Plenty.
limit_req_zone $real_client_ip zone=rl_pay:10m       rate=10r/m;   # /api/pay         (paid registration)
limit_req_zone $real_client_ip zone=rl_register:10m  rate=5r/m;    # /api/register-bot, /api/register/* (initiate)
limit_req_zone $real_client_ip zone=rl_action:10m    rate=120r/m;  # /api/action      (heartbeats, reports)
limit_req_zone $real_client_ip zone=rl_admin:10m     rate=30r/m;   # /api/admin/*
limit_req_zone $real_client_ip zone=rl_default:10m   rate=60r/m;   # everything else

# Connection (concurrent TCP) limit per IP
limit_conn_zone $real_client_ip zone=cc_per_ip:10m;

# Custom log format (with X-Forwarded-For + upstream time).
# cf_ipcountry: set by Cloudflare as CF-IPCountry on the request to origin; empty if not behind CF.
log_format kyahub_log
    '$real_client_ip - $remote_user [$time_local] '
    '"$request" $status $body_bytes_sent '
    '"$http_user_agent" '
    'rt=$request_time uct=$upstream_connect_time urt=$upstream_response_time '
    'host=$host cf_ipcountry=$http_cf_ipcountry';

# Server block — default catch-all on this container's port 80.
# nginx-gen (outer) routes Host:umbraxon.xyz here via VIRTUAL_HOST env.
server {
    listen 80 default_server;
    server_name _;

    access_log /var/log/nginx/access.log kyahub_log;
    error_log  /var/log/nginx/error.log warn;

    # -----------------------------------------------------------------
    #  HARD LIMITS — protect against runaway clients & DoS
    # -----------------------------------------------------------------
    # Maximum request body size (POST /api/action etc.)
    client_max_body_size 256k;

    # Slowloris protection — drop slow clients
    client_body_timeout      10s;
    client_header_timeout    10s;
    send_timeout             10s;
    keepalive_timeout        15s;
    keepalive_requests       100;

    # Buffer sizes (oversized requests get rejected by 414/494/400)
    client_body_buffer_size       16k;
    client_header_buffer_size      8k;
    large_client_header_buffers   4 16k;

    # Concurrent connections per IP cap (return 429 same as rate-limit for consistency)
    limit_conn cc_per_ip 50;
    limit_conn_status 429;
    limit_req_status 429;
    # Tell clients when to retry
    add_header Retry-After 60 always;

    # -----------------------------------------------------------------
    #  SECURITY HEADERS (outer nginx may also add some; idempotent)
    # -----------------------------------------------------------------
    add_header X-Content-Type-Options    "nosniff"        always;
    add_header X-Frame-Options           "SAMEORIGIN"     always;
    add_header Referrer-Policy           "no-referrer-when-downgrade" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    # HSTS is set by outer nginx (it terminates TLS); we don't override.

    # -----------------------------------------------------------------
    #  ROUTING — per-endpoint rate buckets + burst tolerance
    # -----------------------------------------------------------------

    # -----------------------------------------------------------------
    #  PUBLIC TERMS OF SERVICE
    #  Files live on the host at /root/kya-hub/nginx-proxy/snippets/
    #  (bind-mounted read-only into this container at /etc/nginx/snippets/).
    #  To update content: edit the file on the host; no reload needed
    #  (alias reads file content per request). See terms.html header
    #  comment + UMBRAXON.md §32 for the full operator runbook.
    #  Invoice PDFs + cert JSON termsOfUse.id reference these URLs.
    # -----------------------------------------------------------------
    location = /terms {
        access_log off;
        default_type text/html;
        charset utf-8;
        add_header Content-Type        "text/html; charset=utf-8"          always;
        add_header Cache-Control       "public, max-age=3600"              always;
        add_header X-Robots-Tag        "index, follow"                     always;
        add_header X-Content-Type-Options "nosniff"                        always;
        add_header Referrer-Policy     "no-referrer-when-downgrade"        always;
        alias /etc/nginx/snippets/terms.html;
    }

    location = /terms.txt {
        access_log off;
        default_type text/plain;
        charset utf-8;
        add_header Content-Type        "text/plain; charset=utf-8"         always;
        add_header Cache-Control       "public, max-age=3600"              always;
        add_header X-Robots-Tag        "index, follow"                     always;
        add_header X-Content-Type-Options "nosniff"                        always;
        add_header Referrer-Policy     "no-referrer-when-downgrade"        always;
        alias /etc/nginx/snippets/terms.txt;
    }

    # Liveness probe — no rate limit (used by monitoring)
    location = /api/status {
        access_log off;
        proxy_pass http://kya_hub_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $real_client_ip;
        proxy_set_header X-Forwarded-For   $real_client_ip;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Health endpoint (full) — admin only, mild limit
    location = /api/admin/system-health {
        limit_req zone=rl_admin burst=10 nodelay;
        proxy_pass http://kya_hub_backend;
        include /etc/nginx/snippets/proxy-headers.conf;
    }

    # Paid registration / payment flow — strict
    location ~* ^/api/(pay|invoice) {
        limit_req zone=rl_pay burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://kya_hub_backend;
        include /etc/nginx/snippets/proxy-headers.conf;
    }

    # Bot registration: register-bot, /api/register/... (e.g. initiate) — 5 req/min/IP at edge (aligns with app payLimiter)
    location ~* ^/api/(register-bot|register) {
        limit_req zone=rl_register burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://kya_hub_backend;
        include /etc/nginx/snippets/proxy-headers.conf;
    }

    # Action submission (heartbeats, reports) — higher burst (legitimate bots heartbeat often)
    location ~* ^/api/(action|heartbeat|report) {
        limit_req zone=rl_action burst=30 nodelay;
        limit_req_status 429;
        proxy_pass http://kya_hub_backend;
        include /etc/nginx/snippets/proxy-headers.conf;
    }

    # Admin endpoints
    location ~* ^/api/admin/ {
        limit_req zone=rl_admin burst=15 nodelay;
        limit_req_status 429;
        proxy_pass http://kya_hub_backend;
        include /etc/nginx/snippets/proxy-headers.conf;
    }

    # Webhooks (server-to-server, no app-level rate limit needed — bot-trusted senders)
    # Allow larger payloads (BTCPay can send full invoice JSON).
    location = /api/webhook/btcpay {
        client_max_body_size 256k;
        proxy_pass http://kya_hub_backend;
        include /etc/nginx/snippets/proxy-headers.conf;
    }
    location = /api/webhook/alby {
        client_max_body_size 64k;
        proxy_pass http://kya_hub_backend;
        include /etc/nginx/snippets/proxy-headers.conf;
    }

    # Public cert + status endpoints (read-only, cacheable)
    location ~* ^/api/cert/ {
        limit_req zone=rl_default burst=30 nodelay;
        add_header Cache-Control "public, max-age=60" always;
        proxy_pass http://kya_hub_backend;
        include /etc/nginx/snippets/proxy-headers.conf;
    }

    # Remaining API routes (discovery, health, crl, etc.)
    location ~* ^/api/ {
        limit_req zone=rl_default burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://kya_hub_backend;
        include /etc/nginx/snippets/proxy-headers.conf;
    }

    # Hub static docs and legacy assets (not served by Next)
    location ~* ^/(openapi|docs|crl|public|site|bots)/ {
        limit_req zone=rl_default burst=20 nodelay;
        proxy_pass http://kya_hub_backend;
        include /etc/nginx/snippets/proxy-headers.conf;
    }

    location = /README_API.md {
        proxy_pass http://kya_hub_backend;
        include /etc/nginx/snippets/proxy-headers.conf;
    }

    location = /AGENTS.md {
        proxy_pass http://kya_hub_backend;
        include /etc/nginx/snippets/proxy-headers.conf;
    }

    # Next.js static chunks and assets
    location /_next/ {
        proxy_pass http://kya_portal_backend;
        include /etc/nginx/snippets/proxy-headers.conf;
    }

    # SEO — explicit routes to portal (sitemap/robots from Next.js)
    location = /robots.txt {
        proxy_pass http://kya_portal_backend;
        include /etc/nginx/snippets/proxy-headers.conf;
    }
    location = /sitemap.xml {
        proxy_pass http://kya_portal_backend;
        include /etc/nginx/snippets/proxy-headers.conf;
        add_header Cache-Control "public, max-age=3600" always;
        add_header Content-Type "application/xml; charset=utf-8" always;
    }
    location = /llms.txt {
        proxy_pass http://kya_portal_backend;
        include /etc/nginx/snippets/proxy-headers.conf;
        add_header Cache-Control "public, max-age=86400" always;
    }
    location = /.well-known/kya-hub.json {
        proxy_pass http://kya_portal_backend;
        include /etc/nginx/snippets/proxy-headers.conf;
        add_header Cache-Control "public, max-age=3600" always;
    }

    # Public portal (Next.js on host:3001)
    location / {
        limit_req zone=rl_default burst=40 nodelay;
        limit_req_status 429;
        proxy_pass http://kya_portal_backend;
        include /etc/nginx/snippets/proxy-headers.conf;
    }

    # -----------------------------------------------------------------
    #  CUSTOM ERROR PAGES
    # -----------------------------------------------------------------
    error_page 429 = @rate_limited;
    location @rate_limited {
        default_type application/json;
        return 429 '{"error":"rate_limited","message":"Too many requests. Please slow down.","retry_after_seconds":60}';
    }

    error_page 502 503 504 = @upstream_down;
    location @upstream_down {
        default_type application/json;
        return 503 '{"error":"upstream_unavailable","message":"KYA-Hub backend temporarily unavailable. Try again shortly."}';
    }
}
