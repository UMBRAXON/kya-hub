# Common proxy_set_header directives (included by every location block)
proxy_set_header Host              $host;
proxy_set_header X-Real-IP         $real_client_ip;
proxy_set_header X-Forwarded-For   $real_client_ip;
proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
proxy_set_header X-Forwarded-Host  $host;

proxy_http_version 1.1;
proxy_request_buffering on;
proxy_buffering on;
proxy_buffer_size      8k;
proxy_buffers          8 8k;
proxy_busy_buffers_size 16k;

# Timeouts (do NOT make these long; kya-hub responses are fast)
proxy_connect_timeout  5s;
proxy_send_timeout     15s;
proxy_read_timeout     20s;

# Don't forward keep-alive upstream when client closes
proxy_set_header Connection "";
