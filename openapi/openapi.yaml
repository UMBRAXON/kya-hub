      responses:
        "200": { description: OK }

  /api/agent/{kya_id}/actions:
    get:
      tags: [agent]
      summary: Agent actions list (public)
      parameters:
        - in: path
          name: kya_id
          required: true
          schema: { type: string }
      responses:
        "200": { description: OK }

  /api/agent/{kya_id}/appeal:
    post:
      tags: [agent]
      summary: Submit an appeal (agent self-service)
      parameters:
        - in: path
          name: kya_id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { type: object }
      responses:
        "200": { description: OK }

  /api/agent/{kya_id}/appeals:
    get:
      tags: [agent]
      summary: List appeals for agent (public)
      parameters:
        - in: path
          name: kya_id
          required: true
