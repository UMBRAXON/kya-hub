      responses:
        "200": { description: OK }

  /api/admin/system-health:
    get:
      tags: [admin]
      summary: Admin system health summary
      security:
        - AdminKey: []
      responses:
        "200":
          description: OK

  /api/status:
    get:
      tags: [public]
      summary: Lightweight status endpoint (used by reverse-proxy healthchecks)
      responses:
        "200": { description: OK }

  /api/admin/health/details:
    get:
